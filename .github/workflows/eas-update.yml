name: EAS Update (OTA)

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'

jobs:
  update:
    name: 🚀 Publicar actualización OTA
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔧 Instalar Expo CLI
        run: npm install -g expo-cli@latest

      - name: 🔧 Instalar EAS CLI
        run: npm install -g eas-cli@latest

      - name: 🔄 Iniciar sesión en Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Publicar actualización OTA (Android - Preview)
        run: eas update --platform android --channel preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Publicar actualización OTA (Android - Production)
        run: eas update --platform android --channel production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: ✅ Resumen de la actualización
        run: |
          echo "========================================="
          echo "  🎉 Actualización OTA publicada"
          echo "========================================="
          echo "  Canal: preview + production"
          echo "  Plataforma: Android"
          echo "  Commit: ${{ github.sha }}"
          echo "  Mensaje: ${{ github.event.head_commit.message }}"
          echo "========================================="
